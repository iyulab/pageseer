name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  PDFIUM_RELEASE_TAG: "7763"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pdfium_asset: pdfium-linux-x64.tgz
            pdfium_lib_in_archive: lib/libpdfium.so
            pdfium_lib_filename: libpdfium.so
          - os: windows-latest
            pdfium_asset: pdfium-win-x64.tgz
            pdfium_lib_in_archive: bin/pdfium.dll
            pdfium_lib_filename: pdfium.dll
          - os: macos-latest
            pdfium_asset: pdfium-mac-arm64.tgz
            pdfium_lib_in_archive: lib/libpdfium.dylib
            pdfium_lib_filename: libpdfium.dylib
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Download and extract pdfium
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p pdfium pdfium-extract
          curl -fL -o pdfium.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/${PDFIUM_RELEASE_TAG}/${{ matrix.pdfium_asset }}"
          tar -xzf pdfium.tgz -C pdfium-extract
          cp "pdfium-extract/${{ matrix.pdfium_lib_in_archive }}" "pdfium/${{ matrix.pdfium_lib_filename }}"
          rm -rf pdfium.tgz pdfium-extract

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-features --verbose -- --include-ignored

      - name: cargo build (release)
        run: cargo build --release
